<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>המירוץ של עידו!</title>
    
<!-- React & ReactDOM -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
<!-- Babel for JSX -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
    
<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// --- Custom Icons (Inline SVGs instead of importing lucide-react to work in standalone HTML) ---
const IconPlay = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-white"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
const IconPhone = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-white"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>;
const IconCamera = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-white"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>;
const IconGamepad = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-white"><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line><rect x="2" y="6" width="20" height="12" rx="2"></rect></svg>;
const IconCheckCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-white"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        
// Small icons
const IconTrophy = () => <svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-yellow-500 mx-auto mb-6"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>;
const IconGift = () => <svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-red-500 mx-auto mb-6"><polyline points="20 12 20 22 4 22 4 12"></polyline><rect x="2" y="7" width="20" height="5"></rect><line x1="12" y1="22" x2="12" y2="7"></line><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path></svg>;
const IconAlert = () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-blue-500 mx-auto mb-4 animate-pulse"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
const IconLock = () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-gray-500 mx-auto mb-4"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
const IconUnlock = () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-green-500 mx-auto mb-4"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>;
const IconArrowRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
const IconArrowLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
const IconCheckSmall = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-white"><polyline points="20 6 9 17 4 12"></polyline></svg>;
const IconPhoneSmall = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>;
const IconLockSmall = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
const IconGamepadLarge = () => <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-yellow-400 mx-auto mb-4"><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line><rect x="2" y="6" width="20" height="12" rx="2"></rect></svg>;


function IdoAmazingRace() {
    const [gameStarted, setGameStarted] = useState(false);
    const [currentStation, setCurrentStation] = useState(0);
    const [phoneNumber, setPhoneNumber] = useState('');
    const [checkedItems, setCheckedItems] = useState({});
    const [secretCode, setSecretCode] = useState('');
    const [isStationUnlocked, setIsStationUnlocked] = useState(false);

    const toggleCheck = (stationId, itemIndex) => {
        const key = `$ { stationId }-${itemIndex}`;
        setCheckedItems(prev => ({
                    ...prev,
                    [key]: !prev[key]
                }));
    };

    const stations = [
    {
        id: 1,
        title: 'תחנה 1: חימום מנועים',
        icon: <IconPlay />,
        type: 'list',
        description: 'כדי להתחיל את המירוץ, עליכם להוכיח שאתם צוות מגובש! בצעו את המשימות הבאות:',
        items: [
        'הסתדרו בשורה לפי גובה (מהנמוך לגבוה) מבלי לדבר בכלל!',
        'ספרו עד 10: כל ילד אומר מספר, אסור לשניים לדבר ביחד. נפסלתם? מתחילים מ-1!',
        'העבירו כדור ביניכם באוויר 5 פעמים רצופות מבלי שהוא ייפול לרצפה.'
        ]
    },
    {
        id: 2,
        title: 'תחנה 2: משימת הטלפון הסודי 📱',
        icon: <IconPhone />,
        type: 'phone',
        description: 'איספו פתקים שמרכיבים מספר טלפון! הזינו אותו כאן ושלחו הודעה סודית. הסוכן שיקבל את ההודעה ייתן לעמרי או לכם רמז לקוד שיפתח את המנעול!',
        phoneMessage: 'היי סוכן סמוי! 🕵️‍♂️ קיבלת הודעה מהצוות של עידו! גש לעמרי (או לכל הקבוצה) ותגיד להם בלחש את הרמז הבא: "הקוד מורכב מצבע, ומספר דו ספרתי". (אל תגלו להם שהתשובה היא אדום 44, שיתאמצו לגלות לבד!) בהצלחה!'
    },
    {
        id: 3,
        title: 'תחנה 3: ציד האוצרות הגדול',
        icon: <IconCamera />,
        type: 'list',
        description: 'צאו אל הקהל והביאו את הפריטים והאנשים הבאים למרכז המעגל. סמנו V על כל מה שהשגתם:',
        items: [
        'משקפיי ראייה או שמש',
        'חפץ מזכוכית (מראה, תכשיט, שעון)',
        'גרב צבעונית (לא שחור/לבן!)',
        'צרור עם יותר מ-10 מפתחות 🔑',
        'מישהו שיש לו יותר מ-3 חיות מחמד 🐶',
        'מישהו שעבר דירה בשנה האחרונה 📦',
        'מישהו ששוחה עם דולפינים (או לפחות ראה אחד) 🐬'
        ]
    },
    {
        id: 4,
        title: 'תחנה 4: קריאת חירום! 🚨',
        icon: <IconGamepad />,
        type: 'game',
        description: 'התקבלה קריאת חילוץ דחופה! עליכם להתחבר למערכת "צוות חילוץ 10", לבחור את הצוות והרכב המתאימים, ולסיים משימה בהצלחה.',
        gameInstruction: 'היכנסו למשחק, בצעו חילוץ מלא, וחזרו לכאן כשיש לכם תג הצטיינות ו-150 XP!',
        url: 'https://yosazn.github.io/rescue-game/'
    },
    {
        id: 5,
        title: 'תחנה 5: אומנות ותיאטרון',
        icon: <IconCheckCircle />,
        type: 'list',
        description: 'זמן להראות את הכישרון שלכם! בצעו את המשימות:',
        items: [
        'בנו צורה של פרצוף על הרצפה בעזרת החפצים שאספתם. מישהו מחוץ לחדר צריך להיכנס ולנחש מה זה!',
        'טלפון שבור: העבירו בלחישה את המשפט "הבנים הזמינו פיצה עם זיתים, אננס ובצל בטלפון הסלולרי".',
        'פנטומימה: הציגו "נרדמתי בכיתה בבית ספר" מבלי לדבר, עד שהקהל מנחש.'
        ]
    },
    {
        id: 6,
        title: 'תחנה 6: שדרוג במוסך 🛠️',
        icon: <IconGamepad />,
        type: 'game',
        description: 'רגע לפני הסוף, התחנה דורשת שדרוג טכנולוגי!',
        gameInstruction: 'היכנסו שוב למשחק "צוות חילוץ 10". השתמשו בנקודות ה-XP שצברתם כדי לפתוח שדרוג קוסמטי אחד לפחות במוסך. חזרו הנה כשהרכב שלכם משודרג!',
        url: 'https://yosazn.github.io/rescue-game/'
    }
    ];

    const handleSendWhatsApp = () => {
        if (!phoneNumber) {
            alert("אנא הכנס מספר טלפון");
            return;
        }
        let formattedNumber = phoneNumber.replace(/\D/g, '');
        if (formattedNumber.startsWith('0')) {
            formattedNumber = '972' + formattedNumber.substring(1);
        }
                
        const message = stations[currentStation].phoneMessage;
        const whatsappUrl = `https://wa.me/${formattedNumber}?text=${encodeURIComponent(message)}`;
                
        window.open(whatsappUrl, '_blank');
    };

    const canProceed = () => {
        if (stations[currentStation].type === 'phone') {
            return isStationUnlocked;
        }
        return true;
    };

    const nextStation = () => {
        if (canProceed() && currentStation < stations.length - 1) {
            setCurrentStation(prev => prev + 1);
            setIsStationUnlocked(false);
            setPhoneNumber('');
            setSecretCode('');
        }
        else if (canProceed() && currentStation >= stations.length - 1) {
            setCurrentStation(stations.length); 
        }
    };

    const prevStation = () => {
        if (currentStation > 0) {
            setCurrentStation(prev => prev - 1);
        }
    };

    if (!gameStarted) {
        return (
            <div className="min-h-screen bg-yellow-400 flex flex-col items-center justify-center p-6 text-center" dir="rtl">
            <div className="bg-white rounded-3xl shadow-2xl p-10 max-w-lg w-full transform rotate-1 border-8 border-black">
            <IconTrophy />
            <h1 className="text-5xl font-black mb-4 text-black tracking-tight">המירוץ למיליון</h1>
            <h2 className="text-3xl font-bold mb-8 text-red-600">יום ההולדת של עידו!</h2>
            <p className="text-lg mb-8 font-medium text-gray-700">
            האם אתם מוכנים לעבור את כל התחנות, לפתור את המשימות ולנצח במירוץ?
            </p>
            <button 
            onClick= { () = > setGameStarted(true) }
            className="w-full bg-red-600 hover:bg-red-700 text-white font-black text-2xl py-4 px-8 rounded-full shadow-[0_6px_0_rgb(153,27,27)] active:shadow-none active:translate-y-2 transition-all"
            >
            התחל את המירוץ!
            </button>
            </div>
            </div>
        );
    }

    if (currentStation >= stations.length) {
        return (
            <div className="min-h-screen bg-green-500 flex flex-col items-center justify-center p-6 text-center" dir="rtl">
            <div className="bg-white rounded-3xl shadow-2xl p-10 max-w-lg w-full animate-bounce border-8 border-yellow-400">
            <IconGift />
            <h1 className="text-5xl font-black mb-4 text-black">כל הכבוד!</h1>
            <h2 className="text-3xl font-bold mb-4 text-green-600">סיימתם את המירוץ!</h2>
            <p className="text-xl font-bold text-gray-800 mb-8">
            מזל טוב לעידו! אתם צוות מנצח והוכחתם שאתם אלופים אמיתיים.
            </p>
            <button 
            onClick= { () = > { setGameStarted(false); setCurrentStation(0); setCheckedItems({}); } }
            className="bg-black hover:bg-gray-800 text-white font-bold text-xl py-3 px-8 rounded-full"
            >
            שחקו שוב
            </button>
            </div>
            </div>
        );
    }

    const station = stations[currentStation];
    const progressPercentage = ((currentStation + 1) / stations.length) * 100;

    return (
        <div className="min-h-screen bg-gray-100 p-4 md:p-8 font-sans" dir="rtl">
                
        <div className="max-w-2xl mx-auto mb-8">
        <div className="flex justify-between items-center mb-4">
        <h1 className="text-2xl md:text-3xl font-black text-black">המירוץ של עידו!</h1>
        <span className="bg-yellow-400 text-black font-bold py-1 px-4 rounded-full border-2 border-black">
        תחנה { currentStation + 1 } מתוך { stations.length }
        </span>
        </div>
        <div className="w-full bg-gray-300 rounded-full h-4 border-2 border-black overflow-hidden">
        <div 
        className="bg-red-600 h-4 transition-all duration-500 ease-in-out" 
        style= { { width: `$ { progressPercentage }%`  } }
        ></div>
        </div>
        </div>

        <div className="max-w-2xl mx-auto bg-yellow-400 p-2 rounded-2xl shadow-xl transform -rotate-1">
        <div className="bg-white rounded-xl p-6 md:p-8 border-4 border-black border-dashed min-h-[400px] flex flex-col relative">
                    
        <div className="flex items-center gap-4 mb-6 border-b-4 border-black pb-4">
        <div className="bg-red-600 p-3 rounded-full shadow-md">
        { station.icon }
        </div>
        <h2 className="text-3xl md:text-4xl font-black text-black"> { station.title }</h2>
        </div>

        <p className="text-xl font-medium text-gray-800 mb-6 bg-gray-50 p-4 rounded-lg border-l-4 border-yellow-500">
        { station.description }
        </p>

        <div className="flex-grow mb-8">
                        
        { station.type === 'list' && (
                <ul className="space-y-4">
                { station.items.map((item, index) = > {
                            const isChecked = checkedItems[`$ { station.id }-${index}`];
                            return (
                                <li 
                                key= { index }
                                onClick= { () = > toggleCheck(station.id, index) }
                                className= { `flex items-start gap-4 p-4 rounded-xl cursor-pointer transition-colors border-2 ${
                                    isChecked ? 'bg-green-100 border-green-500 text-green-800' : 'bg-white border-gray-200 hover:border-yellow-400'
                                }`}
                                    >
                                    <div className= { `mt-1 flex-shrink-0 w-6 h-6 rounded border-2 flex items-center justify-center ${
                                    isChecked ? 'bg-green-500 border-green-500' : 'border-gray-400'
                                }`}>
                                        { isChecked && <IconCheckSmall /> }
                                        </div>
                                        <span className= { `text-lg font-bold ${isChecked ? 'line-through opacity-70' : ''}`}>
                                            { item }
                                            </span>
                                            </li>
                                        );
                                    })
                            }
                            </ul>
                        )
                    }

                    { station.type === 'phone' && (
                            <div className="space-y-6">
                            <div className="bg-blue-50 border-4 border-blue-200 rounded-xl p-6 text-center">
                            <IconAlert />
                            <h3 className="text-2xl font-bold mb-4">שלב א': שיגור לסוכן</h3>
                            <p className="text-gray-700 mb-4 font-medium">
                                הזינו את המספר שהרכבתם מהפתקים ושלחו הודעה:
                            </p>
                            <input 
                                type="tel"
                                placeholder="לדוגמה: 0501234567"
                                value={phoneNumber}
                                onChange={(e) => setPhoneNumber(e.target.value)}
                                className="w-full text-center text-2xl p-4 border-2 border-gray-400 rounded-lg mb-4 focus:border-blue-500 focus:outline-none focus:ring-4 focus:ring-blue-200"
                                dir="ltr"
                            />
                            <button 
                                onClick={handleSendWhatsApp}
                                className="bg-green-500 hover:bg-green-600 text-white font-bold text-xl py-3 px-6 rounded-full shadow-lg flex items-center justify-center gap-2 w-full transition-transform active:scale-95"
                            >
                                <IconPhoneSmall />
                                שלח משימה בוואטסאפ
                            </button>
                            </div>

                            <div className={`border-4 rounded-xl p-6 text-center transition-colors duration-500 ${isStationUnlocked ? 'bg-green-50 border-green-500' : 'bg-gray-100 border-gray-400'}`}>
                            {isStationUnlocked ? (
                                <IconUnlock />
                            ) : (
                                <IconLock />
                            )}
                            <h3 className="text-2xl font-bold mb-4">שלב ב': שבירת הקוד</h3>
                            <p className="text-gray-700 mb-4 font-medium">
                            הקלידו כאן את הקוד שקיבלתם מהסוכן:
                            </p>
                            <input 
                            type="text"
                            placeholder="צבע ומספר"
                            value= { secretCode }
                            onChange= { (e) = > {
                                    setSecretCode(e.target.value);
                                    if (e.target.value.replace(/\s/g, '') === 'אדום44') {
                                        setIsStationUnlocked(true);
                                    }
                                    else {
                                        setIsStationUnlocked(false);
                                    }
                                } }
                            className= { `w-full text-center text-2xl p-4 border-2 rounded-lg mb-4 focus:outline-none ${isStationUnlocked ? 'border-green-500 bg-green-100 text-green-800' : 'border-gray-400'}`}
                                />
                                { isStationUnlocked && <p className="text-green-600 font-bold animate-pulse">המנעול נפתח! אפשר להמשיך!</p> }
                                </div>
                                </div>
                            )
                        }

                        { station.type === 'game' && (
                                <div className="bg-gray-900 text-white rounded-xl p-6 text-center border-4 border-red-600">
                                <IconGamepadLarge />
                                <h3 className="text-2xl font-bold mb-4 text-red-500">התחברות למערכת...</h3>
                                <p className="text-lg font-medium mb-6">
                                { station.gameInstruction }
                                </p>
                                <a 
                                href= { station.url } 
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-block bg-yellow-400 hover:bg-yellow-500 text-black font-black text-2xl py-4 px-8 rounded-full shadow-[0_6px_0_rgb(161,98,7)] active:shadow-none active:translate-y-2 transition-all"
                                >
                                פתח את משחק החילוץ! 🚁
                                </a>
                                </div>
                            )
                        }

                        </div>

                        <div className="flex justify-between items-center mt-auto pt-6 border-t-2 border-gray-200">
                        <button 
                        onClick= { prevStation }
                        disabled= { currentStation === 0 }
                        className= { `flex items-center gap-2 font-bold px-4 py-2 rounded-lg transition-colors ${
                            currentStation === 0 ? 'text-gray-400 cursor-not-allowed' : 'text-gray-700 hover:bg-gray-100'
                        }`}
                            >
                            <IconArrowRight /> הקודם
                            </button>

                            <button 
                            onClick= { nextStation }
                            disabled= { !canProceed() }
                            className= { `$ { canProceed() ? 'bg-black hover:bg-gray-800' : 'bg-gray-400 cursor-not-allowed' } text-white font-bold text-xl py-3 px-8 rounded-full shadow-lg flex items-center gap-2 transition-transform ${canProceed() ? 'active:scale-95' : ''}`}
                                >
                                { currentStation === stations.length - 1 ? 'לסיום המירוץ!' : 'למשימה הבאה' }
                                { canProceed() && <IconArrowLeft /> }
                                { !canProceed() && <IconLockSmall /> }
                                </button>
                                </div>

                                </div>
                                </div>
                                </div>
                            );
                        }

                        const root = ReactDOM.createRoot(document.getElementById('root'));
                        root.render(<IdoAmazingRace />);
                        </script>
                        </body>
                        </html>
